spring:
  application:
    name: marketplace

  # Virtual Threads (default in Boot 4)
  threads:
    virtual:
      enabled: true

  # DataSource - PostgreSQL
  datasource:
    url: jdbc:postgresql://localhost:5432/marketplace
    username: marketplace
    password: marketplace_secret
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
        query:
          fail_on_pagination_over_collection_fetch: true

  # Flyway
  flyway:
    enabled: true
    locations:
      - classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  # Redis
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 5000
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 4

  # Elasticsearch
  elasticsearch:
    uris: http://localhost:9200

  # Cache
  cache:
    type: redis
    redis:
      time-to-live: 1800000  # 30 minutes

  # Jackson
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

  # Async
  task:
    execution:
      pool:
        core-size: 8
        max-size: 32
        queue-capacity: 100
        keep-alive: 60s

  # WebSocket
  websocket:
    allowed-origins: "*"

# Server
server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
  observations:
    key-values:
      application: marketplace
  metrics:
    export:
      prometheus:
        enabled: true
  tracing:
    sampling:
      probability: 1.0

# OpenTelemetry
otel:
  exporter:
    otlp:
      endpoint: http://localhost:4317
  resource:
    attributes:
      service.name: marketplace

# JWT
jwt:
  secret: ${JWT_SECRET:defaultSecretKeyThatShouldBeAtLeast256BitsLongForHS256AlgorithmButMustBeOverriddenInProduction}
  access-token-validity-ms: 3600000     # 1 hour
  refresh-token-validity-ms: 604800000   # 7 days

# Resilience4j
resilience4j:
  circuitbreaker:
    configs:
      default:
        failure-rate-threshold: 50
        slow-call-rate-threshold: 80
        wait-duration-in-open-state: 30s
        slow-call-duration-threshold: 5s
        permitted-number-of-calls-in-half-open-state: 5
        minimum-number-of-calls: 10
        sliding-window-size: 20
    instances:
      payment:
        base-config: default
      search:
        base-config: default
  ratelimiter:
    configs:
      default:
        limit-for-period: 100
        limit-refresh-period: 1s
        timeout-duration: 5s
    instances:
      auth:
        limit-for-period: 20
        limit-refresh-period: 1s
        timeout-duration: 3s
      api:
        base-config: default

# Springdoc OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

# Spring Modulith
spring.modulith:
  events:
    jdbc:
      schema-initialization:
        enabled: true
  detect-usages:
    enabled: true

# Logging
logging:
  level:
    root: INFO
    com.marketplace: DEBUG
    org.springframework.modulith: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

---
# Docker Profile
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://postgres:5432/marketplace
    username: marketplace
    password: ${DB_PASSWORD}
  data:
    redis:
      host: redis
  elasticsearch:
    uris: http://elasticsearch:9200

otel:
  exporter:
    otlp:
      endpoint: http://otel-collector:4317

---
# Test Profile
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:tc:postgresql:18:///marketplace
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false
